/* ── Prompts ── */
const getMemCtx=m=>m.length?'\n\n[Conversation Memory]\n'+m.slice(-5).map((x,i)=>`${i+1}. [${x.src}] ${x.q}`).join('\n'):'';

const buildSys=(pid,sub,mem=[])=>{
  const r=RULES[pid]||RULES.groq_llama33_70b;
  const base=`You are ${r.modelName}, a helpful AI assistant in GoAi. Be clear, honest, and thorough. Help with anything — writing, research, coding, math, creative tasks, advice, or just conversation.${getMemCtx(mem)}`;
  return sub?(base+'\n\nYour specific task:\n'+sub):base;
};

const buildDCSys=(pid,mem=[])=>{
  const r=RULES[pid]||RULES.groq_llama33_70b;
  return `You are ${r.modelName} in GoAi DeepCoder Mode — a world-class software engineer.
STRICT RULES:
- Write COMPLETE, RUNNABLE code. Zero placeholders.
- No "// TODO", no "...", no "see above", no "rest of code here"
- Include ALL imports, types, error handling, edge cases
- Follow clean code principles and language best practices
- Add comments only for non-obvious logic
- Close ALL \`\`\` code blocks
- End your response with [COMPLETE]
${getMemCtx(mem)}`;
};

const checkOk=t=>{
  if(!t||t.length<40)return{ok:false,issue:'too short'};
  if((t.match(/```/g)||[]).length%2!==0)return{ok:false,issue:'unclosed ``` block'};
  if(/(\.\.\.|…)\s*$/.test(t.trim()))return{ok:false,issue:'truncated'};
  if(/\/\/\s*(rest|todo|continue|implement|add more)/i.test(t))return{ok:false,issue:'placeholder comment'};
  return{ok:true,issue:''};
};

/* ── API helpers ── */
async function api(pid,sys,msgs,tok){
  const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({provider:pid,systemPrompt:S_(sys).slice(0,12000),messages:(msgs||[]).map(m=>({role:m.role,content:S_(m.content).slice(0,18000)})),maxTokens:tok||RULES[pid]?.tok||2000})});
  const d=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(d.error||'HTTP '+r.status);
  if(!d.text)throw new Error('Empty from '+pid);
  return d.text;
}
async function doMem(prompt,src){
  try{const r=await fetch('/api/memory',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:S_(prompt).slice(0,500)})});const d=await r.json();if(d?.summary)return{q:d.summary,src:src||'user',t:Date.now()};}catch{}
  return null;
}

/* ── Parse code blocks ── */
function parseParts(txt){
  const str=S_(txt);if(!str)return[{t:'txt',c:''}];
  const rx=/```(\w*)\n([\s\S]*?)```/g;const pts=[];let li=0,m;
  while((m=rx.exec(str))!==null){if(m.index>li)pts.push({t:'txt',c:str.slice(li,m.index)});pts.push({t:'code',l:m[1]||'',c:m[2]||''});li=rx.lastIndex;}
  if(li<str.length)pts.push({t:'txt',c:str.slice(li)});
  return pts.length?pts:[{t:'txt',c:str}];
}

function MsgContent({text,onPv}){
  const[cpd,setCpd]=useState({});
  const cp=(i,c)=>{try{navigator.clipboard.writeText(c||'');}catch{}setCpd(p=>({...p,[i]:1}));setTimeout(()=>setCpd(p=>({...p,[i]:0})),1400);};
  return(
    <div>
      {parseParts(text).map((p,i)=>p.t==='txt'
        ?<div key={i} style={{whiteSpace:'pre-wrap',lineHeight:1.78,wordBreak:'break-word',fontSize:13}}>{p.c}</div>
        :<div key={i} style={{margin:'7px 0'}}>
          <div style={{display:'flex',gap:6,padding:'3px 0',alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:9,background:'rgba(99,102,241,.16)',border:'1px solid rgba(99,102,241,.28)',borderRadius:6,padding:'1px 7px',color:'#a5b4fc',letterSpacing:'.05em'}}>{p.l||'code'}</span>
            <button onClick={()=>cp(i,p.c)} style={{background:'rgba(99,102,241,.1)',border:'1px solid rgba(99,102,241,.26)',borderRadius:12,padding:'2px 9px',fontSize:9,cursor:'pointer',color:'#c4b5fd',fontFamily:'inherit'}}>{cpd[i]?'✅':'📋'}</button>

    <div className="bub" style={{maxWidth:'94%',alignSelf:b.se||'flex-start',animation:'msgIn .22s ease',position:'relative'}}>
      <div style={{padding:'11px 14px',borderRadius:b.br||'6px 22px 22px 22px',background:b.bg||'transparent',border:'1px solid '+(b.bd||'transparent'),color:b.tc||'#e2e8f0',fontStyle:b.fi||'normal',lineHeight:1.7}}>
        <MsgContent text={S_(msg.text)} onPv={onPv}/>
      </div>
      {msg.role!=='meta'&&msg.role!=='warn'&&msg.text&&(
        <button className="cpb" onClick={()=>{try{navigator.clipboard.writeText(S_(msg.text));}catch{}setCpd(true);setTimeout(()=>setCpd(false),1400);}} style={{position:'absolute',top:6,right:6,opacity:0,background:'rgba(4,8,22,.95)',border:'1px solid rgba(99,102,241,.26)',borderRadius:10,padding:'2px 8px',fontSize:9,cursor:'pointer',color:'#a5b4fc',transition:'opacity .18s'}}>{cpd?'✅':'📋'}</button>
      )}
    </div>
  );
}
function App(){
  const[chats,setChats]=useState([]);
  const[activeId,setActiveId]=useState(null);
  const[activeMsgs,setActiveMsgs]=useState([]);
  const[activeMode,setActiveMode]=useState('fast');
  const[activePref,setActivePref]=useState('groq_llama33_70b');
  const[sideOpen,setSideOpen]=useState(true);
  const[aboutOpen,setAboutOpen]=useState(false);
  const[mem,setMem]=useState([]);
  const[memOpen,setMemOpen]=useState(false);
  const[pickerOpen,setPickerOpen]=useState(false);
  const[pv,setPv]=useState(null);
  const[busy,setBusy]=useState(false);
  const[typing,setTyping]=useState('');
  const[stat,setStat]=useState({t:'Connecting...',c:''});
  const[provs,setProvs]=useState({});
  const[inp,setInp]=useState('');
  const chatRef=useRef(null);
  const inpRef=useRef(null);
  const saveTimer=useRef(null);

  const avail=useMemo(()=>Object.entries(provs).filter(([,v])=>v.available).map(([k])=>k),[provs]);
  const provAvail=useMemo(()=>Object.values(provs).filter(v=>v.available).length,[provs]);

  /* ── DC helpers using server flags ── */
  const dcManagers=useMemo(()=>Object.entries(provs).filter(([,v])=>v.available&&v.isDCManager).map(([k])=>k),[provs]);
  const dcWorkers=useMemo(()=>Object.entries(provs).filter(([,v])=>v.available&&v.isDCWorker).map(([k])=>k),[provs]);

  /* ── Init ── */
  useEffect(()=>{
    fetch('/api/providers').then(r=>r.json()).then(d=>{
      setProvs(d);
      setStat({t:'Ready · '+Object.values(d).filter(v=>v.available).length+' AIs',c:'good'});
    }).catch(()=>setStat({t:'⚠️ Server offline — run: node server.js',c:'bad'}));
    chatAPI.list().then(cs=>{
      if(cs&&cs.length){setChats(cs);setActiveId(cs[0].id);loadMsgs(cs[0].id,cs[0].mode||'fast',cs[0].pref||'groq_llama33_70b');}
      else createChat();
    }).catch(()=>createChat());
    try{const s=localStorage.getItem('goai_mem');if(s){const p=JSON.parse(s);if(Array.isArray(p))setMem(p);}}catch{}
  },[]);

  useEffect(()=>{if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight;},[activeMsgs,typing]);

  const loadMsgs=async(id,mode,pref)=>{
    try{const c=await chatAPI.get(id);setActiveMsgs(Array.isArray(c.messages)?c.messages:[]);setActiveMode(mode||c.mode||'fast');setActivePref(pref||c.pref||'groq_llama33_70b');}
    catch{setActiveMsgs([]);}
  };

  /* ── Debounced save to SQLite ── */
  const scheduleSave=useCallback((id,title,mode,pref,msgs)=>{
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      const clean=msgs.filter(m=>!m.isLog&&!m.isComm&&m.role&&m.text!=null);
      chatAPI.save(id,title,mode,pref,clean).catch(console.error);
      // Update msg_count in sidebar
      setChats(prev=>prev.map(c=>c.id===id?{...c,msg_count:clean.length,updated_at:Date.now(),title}:c));
    },800);
  },[]);

  /* ── Chat CRUD ── */
  const createChat=useCallback(async()=>{
    const id=uid();
    const mode='fast',pref='groq_llama33_70b';
    await chatAPI.create(id,'New Chat',mode,pref).catch(console.error);
    const newChat={id,title:'New Chat',mode,pref,msg_count:0,created_at:Date.now(),updated_at:Date.now()};
    setChats(prev=>[newChat,...prev]);
    setActiveId(id);setActiveMsgs([]);setActiveMode(mode);setActivePref(pref);setInp('');
  },[]);

  const selectChat=useCallback(async id=>{
    if(id===activeId)return;
    const c=chats.find(x=>x.id===id);
    if(!c)return;
    setActiveId(id);
    await loadMsgs(id,c.mode,c.pref);
    setSideOpen(false);
  },[activeId,chats]);

  const deleteChat=useCallback(async id=>{
    await chatAPI.del(id).catch(console.error);
    setChats(prev=>{
      const n=prev.filter(c=>c.id!==id);
      if(id===activeId){
        if(n.length){setActiveId(n[0].id);loadMsgs(n[0].id,n[0].mode,n[0].pref);}
        else{setActiveId(null);setActiveMsgs([]);createChat();}
      }
      return n;
    });
  },[activeId,createChat]);

  const setMode=useCallback(m=>{setActiveMode(m);if(activeId){setChats(prev=>prev.map(c=>c.id===activeId?{...c,mode:m}:c));chatAPI.save(activeId,chats.find(c=>c.id===activeId)?.title||'New Chat',m,activePref,activeMsgs.filter(x=>!x.isLog&&!x.isComm)).catch(console.error);};},[activeId,activePref,activeMsgs,chats]);
  const setPref=useCallback(p=>{setActivePref(p);if(activeId){setChats(prev=>prev.map(c=>c.id===activeId?{...c,pref:p}:c));chatAPI.save(activeId,chats.find(c=>c.id===activeId)?.title||'New Chat',activeMode,p,activeMsgs.filter(x=>!x.isLog&&!x.isComm)).catch(console.error);};},[activeId,activeMode,activeMsgs,chats]);

  /* ── Message helpers ── */
  const addMsg=useCallback((role,text,extra={})=>{
    const msg={id:uid(),role,text:S_(text),...extra};
    setActiveMsgs(prev=>{
      const n=[...prev,msg];
      const chat=chats.find(c=>c.id===activeId);
      const title=chat?.title==='New Chat'&&role==='user'?text.slice(0,42)+(text.length>42?'…':''):chat?.title||'New Chat';
      scheduleSave(activeId,title,activeMode,activePref,n);
      if(title!==chat?.title)setChats(p=>p.map(c=>c.id===activeId?{...c,title}:c));
      return n;
    });
  },[activeId,activeMode,activePref,chats,scheduleSave]);

  const addLog=useCallback((label,ok,text)=>{setActiveMsgs(prev=>[...prev,{id:uid(),isLog:true,label:S_(label),ok:!!ok,text:S_(text)}]);},[]);
  const addComm=useCallback(comms=>{if(Array.isArray(comms)&&comms.length)setActiveMsgs(prev=>[...prev,{id:uid(),isComm:true,comms}]);},[]);
  const addMem=useCallback(m=>{if(m)setMem(prev=>{const n=[...prev,m].slice(-30);try{localStorage.setItem('goai_mem',JSON.stringify(n));}catch{}return n;});},[]);
  const ss=useCallback((t,c='')=>setStat({t,c}),[]);
  const clearChat=useCallback(()=>{setActiveMsgs([]);if(activeId)chatAPI.save(activeId,chats.find(c=>c.id===activeId)?.title||'New Chat',activeMode,activePref,[]).catch(console.error);ss('Cleared','good');},[activeId,activeMode,activePref,chats]);

  /* ══════════ AI PIPELINES ══════════ */

  async function commsRound(task,workers){
    const settled=await Promise.allSettled(workers.slice(0,6).map(async pid=>{
      const r=RULES[pid]||RULES.groq_llama33_70b;
      const sys=`You are ${r.modelName}. In ONE sentence (max 20 words), state what YOU will specifically handle.`;
      const text=await api(pid,sys,[{role:'user',content:'Task: '+S_(task).slice(0,240)}],90);
      return{pid,text:S_(text).replace(/\n/g,' ').trim().slice(0,170)};
    }));
    return settled.filter(r=>r.status==='fulfilled'&&r.value?.pid).map(r=>r.value);
  }

  async function mgrPlan(task,workers,proposals,mgrId){
    const mgr=mgrId||MGR_ID;
    const sys='You are GoAi Manager. Output ONLY valid JSON. No text outside JSON.';
    const propText=proposals.length
      ?'Proposals:\n'+proposals.map(p=>`${p.pid}(${RULES[p.pid]?.role||p.pid}): "${p.text}"`).join('\n')
      :'Workers: '+workers.map(p=>`${p}(${RULES[p]?.role||p})`).join(', ');
    const q=`Task: "${S_(task).slice(0,280)}"\n\n${propText}\n\nAssign concrete subtasks.\nOutput ONLY: {"plan":"strategy","assignments":[{"prov":"groq_llama33_70b","subtask":"..."},...]}`;
    try{
      const raw=await api(mgr,sys,[{role:'user',content:q}],2000);
      const match=(raw||'').match(/\{[\s\S]*?"assignments"[\s\S]*?\}/);
      if(!match)throw new Error();
      const parsed=JSON.parse(match[0]);
      if(!Array.isArray(parsed.assignments))throw new Error();
      return parsed;
    }catch{
      return{plan:'Parallel fallback',assignments:workers.slice(0,6).map(w=>({prov:w,subtask:task+'\n\nYou are '+S_(RULES[w]?.modelName||w)+'. Provide a COMPLETE helpful response.'}))};
    }
  }

  async function mgrReview(task,responses,mgrId){
    const mgr=mgrId||MGR_ID;
    const sys='You are GoAi Manager. Output ONLY valid JSON.';
    const listing=responses.map((r,i)=>`[${i}] ${r.label}: ${S_(r.text).slice(0,220)}`).join('\n---\n');
    const q=`Task: "${S_(task).slice(0,130)}"\nOutputs:\n${listing}\nJSON: {"reviews":[{"idx":0,"label":"...","complete":true,"score":8,"issue":""}],"missing":"gaps"}`;
    try{const raw=await api(mgr,sys,[{role:'user',content:q}],1400);const match=(raw||'').match(/\{[\s\S]*?"reviews"[\s\S]*?\}/);if(!match)throw new Error();return JSON.parse(match[0]);}
    catch{return null;}
  }

  async function mgrAssemble(task,responses,rd,hist,memSnap,mgrId,isCoding=false){
    const mgr=mgrId||MGR_ID;
    setTyping('🎯 Manager assembling final answer...');
    const sorted=[...responses].sort((a,b)=>(b.score||5)-(a.score||5));
    const parts=sorted.map(r=>`### ${r.label} [${r.score||'?'}/10]\n${S_(r.text).slice(0,650)}`).join('\n---\n');
    const sys=isCoding
      ?`You are GoAi Manager in DeepCoder Mode. Assemble ONE FINAL production-ready codebase. Integrate all worker contributions. Ensure all code is complete and runnable. Close ALL \`\`\` blocks. End [COMPLETE].${getMemCtx(memSnap)}`
      :`You are GoAi Manager. Produce ONE FINAL clear, complete answer by synthesizing the best parts of each worker's response. Be thorough and helpful.${getMemCtx(memSnap)}`;
    const q=`Task: "${S_(task).slice(0,270)}"${rd?.missing?'\nMissing: '+rd.missing:''}\n\nWorkers:\n${parts}\n\nProduce the final answer:`;
    try{
      const final=await api(mgr,sys,[...hist.slice(-2),{role:'user',content:q.slice(0,18000)}],RULES[mgr]?.tok||6000);
      addMsg('mgr',(isCoding?'💻':'🎯')+' Manager Final Answer\n\n'+S_(final));
      ss('✓ Done · '+responses.length+' workers','good');
      doMem((isCoding?'DeepCoder':'Manager')+': '+S_(task).slice(0,60),isCoding?'deepcoder':'manager').then(addMem);
    }catch(e){
      addMsg('warn','❌ Assembly: '+S_(e.message));
      if(sorted.length)addMsg('mgr','🎯 Best result ('+S_(sorted[0].label)+')\n\n'+S_(sorted[0].text));
    }
    setTyping('');
  }

  /* ── DeepCoder Pipeline ── */
  async function runDeepCoder(p,hist,memSnap){
    // Pick DC manager (or_deepseek_r1 preferred, fallbacks)
    const dcMgr=dcManagers[0]||avail.find(x=>x.includes('deepseek'))||MGR_ID;
    const workers=dcWorkers.filter(x=>x!==dcMgr&&avail.includes(x));
    if(!workers.length&&!avail.length){addMsg('warn','No DeepCoder workers available.');ss('No workers','bad');return;}
    const useWorkers=workers.length?workers:[...avail.filter(x=>x!==dcMgr)].slice(0,5);

    addMsg('meta',`💻 DeepCoder · Manager: ${RULES[dcMgr]?.modelName||dcMgr} · ${useWorkers.length} coders`);

    // Step 1: Architecture proposals
    setTyping('💻 AIs proposing code architecture...');
    let proposals=[];
    try{
      const settled=await Promise.allSettled(useWorkers.slice(0,5).map(async pid=>{
        const r=RULES[pid];
        const sys=`You are ${r.modelName}. In ONE sentence (max 22 words), state the specific coding module or aspect you will implement.`;
        const text=await api(pid,sys,[{role:'user',content:'Coding task: '+S_(p).slice(0,220)}],90);
        return{pid,text:S_(text).replace(/\n/g,' ').trim().slice(0,180)};
      }));
      proposals=settled.filter(r=>r.status==='fulfilled'&&r.value?.pid).map(r=>r.value);
    }catch(e){console.warn('DC comms:',e.message);}
    setTyping('');
    if(proposals.length)addComm(proposals);

    // Step 2: Manager plans modules
    setTyping('📋 DeepSeek architecting code modules...');
    let assignments=useWorkers.slice(0,6).map(w=>({prov:w,subtask:`Write COMPLETE code for: "${S_(p).slice(0,150)}"\nYou are ${RULES[w]?.modelName||w}, strength: ${RULES[w]?.s||'coding'}. ALL code must be runnable. End [COMPLETE].`}));
    try{
      const sys='You are GoAi DeepCoder Manager. Output ONLY valid JSON.';
      const propText=proposals.length
        ?'Proposals:\n'+proposals.map(x=>`${x.pid}(${RULES[x.pid]?.role}): "${x.text}"`).join('\n')
        :'Workers: '+useWorkers.map(x=>`${x}(${RULES[x]?.role})`).join(', ');
      const planRaw=await api(dcMgr,sys,[{role:'user',content:`Coding task: "${S_(p).slice(0,250)}"\n\n${propText}\n\nAssign each worker a SPECIFIC coding module/function to implement completely.\nOutput ONLY: {"plan":"architecture description","assignments":[{"prov":"or_deepseek_v3","subtask":"Implement the [specific module]..."}]}`}],2200);
      const match=(planRaw||'').match(/\{[\s\S]*?"assignments"[\s\S]*?\}/);
      if(match){
        const parsed=JSON.parse(match[0]);
        if(Array.isArray(parsed.assignments)&&parsed.assignments.length){
          const va=parsed.assignments.filter(a=>a.prov&&avail.includes(a.prov)&&a.subtask&&a.prov!==dcMgr);
          if(va.length){
            assignments=va;
            addMsg('mgr','📋 DeepCoder Architecture: '+S_(parsed.plan)+'\n\n'+assignments.map(a=>`${RULES[a.prov]?.e||'·'} ${RULES[a.prov]?.modelName||a.prov}:\n  ${S_(a.subtask).slice(0,85)}`).join('\n'));
          }
        }
      }
    }catch(e){console.warn('DC plan:',e.message);}
    setTyping('');

    // Step 3: Parallel code generation
    setTyping(`⚙️ ${assignments.length} coding AIs writing in parallel...`);
    const settled=await Promise.allSettled(assignments.map(async a=>{
      const ans=await api(a.prov,buildDCSys(a.prov,memSnap),[...hist,{role:'user',content:S_(a.subtask||p)}]);
      return{prov:a.prov,label:S_(RULES[a.prov]?.modelName||a.prov)+' ('+S_(RULES[a.prov]?.role||'AI')+')',sub:S_(a.subtask||p),text:S_(ans||''),score:7};
    }));
    setTyping('');
    const responses=[];
    for(const r of settled){
      if(r.status==='fulfilled'&&r.value){const v=r.value,chk=checkOk(v.text);v.ok=chk.ok;v.issue=chk.issue;responses.push(v);addLog(v.label+(chk.ok?'':' ⚠️ '+chk.issue),chk.ok,v.text);}
      else addMsg('warn','❌ Coder failed: '+S_(r.reason?.message||'error').slice(0,150));
    }
    if(!responses.length){addMsg('warn','🚫 All coders failed. Check API keys.');ss('Failed','bad');return;}

    // Step 4: Code review
    setTyping('🔍 DeepSeek reviewing code quality...');
    let rd=null;
    try{rd=await mgrReview(p,responses,dcMgr);}catch(e){console.warn('DC review:',e.message);}
    setTyping('');
    if(rd?.reviews&&Array.isArray(rd.reviews)){
      addMsg('mgr','🔍 Code Review:\n'+rd.reviews.map(rv=>`• ${rv.label||'AI'}: ${rv.score||'?'}/10 ${rv.complete?'✅':'⚠️ '+S_(rv.issue)}`).join('\n')+(rd.missing?'\n📌 Missing: '+rd.missing:''));
      rd.reviews.forEach(rv=>{if(typeof rv.idx==='number'&&rv.idx<responses.length)responses[rv.idx].score=rv.score||7;});
    }

    // Step 5: Assemble production code
    await mgrAssemble(p,responses,rd,hist,memSnap,dcMgr,true);
  }

  /* ── General Managed Pipeline ── */
  async function runManaged(p,hist,memSnap,isDebate){
    const workers=avail.filter(x=>x!==MGR_ID);
    if(!workers.length){addMsg('warn','No workers. Check API keys.');ss('No workers','bad');return;}
    addMsg('meta',(isDebate?'💬 Debate':'🎯 Managed')+' · Manager: '+S_(RULES[MGR_ID]?.modelName||MGR_ID)+' · '+workers.length+' workers');

    setTyping('💬 AIs discussing...');
    let proposals=[];
    try{proposals=await commsRound(p,workers);}catch(e){console.warn('comms:',e.message);}
    setTyping('');
    if(proposals.length)addComm(proposals);

    setTyping('📋 Manager planning...');
    let plan={plan:'Parallel',assignments:[]};
    try{plan=await mgrPlan(p,workers,proposals);}catch(e){console.warn('plan:',e.message);}
    const rawA=Array.isArray(plan?.assignments)?plan.assignments:[];
    const va=rawA.filter(a=>a&&a.prov&&a.prov!==MGR_ID&&avail.includes(a.prov)&&a.subtask);
    const fa=va.length?va:workers.slice(0,5).map(w=>({prov:w,subtask:p+'\n\nYou are '+S_(RULES[w]?.modelName||w)+'. Give a complete, helpful answer.'}));
    addMsg('mgr','📋 Plan: '+S_(plan?.plan)+'\n\n'+fa.map(a=>`${RULES[a.prov]?.e||'·'} ${RULES[a.prov]?.modelName||a.prov}:\n  ${S_(a.subtask).slice(0,85)}`).join('\n'));
    setTyping('');
    setTyping(`⚙️ ${fa.length} workers responding...`);
    const settled=await Promise.allSettled(fa.map(async a=>{
      const ans=await api(a.prov,buildSys(a.prov,a.subtask,memSnap),[...hist,{role:'user',content:S_(a.subtask||p)}]);
      return{prov:a.prov,label:S_(RULES[a.prov]?.modelName||a.prov)+' ('+S_(RULES[a.prov]?.role||'AI')+')',sub:S_(a.subtask||p),text:S_(ans||''),score:7};
    }));
    setTyping('');
    const responses=[];
    for(const r of settled){
      if(r.status==='fulfilled'&&r.value){const v=r.value,chk=checkOk(v.text);v.ok=chk.ok;v.issue=chk.issue;responses.push(v);addLog(v.label,chk.ok,v.text);}
      else addMsg('warn','❌ Worker: '+S_(r.reason?.message||'failed').slice(0,160));
    }
    if(!responses.length){addMsg('warn','🚫 All workers failed.');ss('Failed','bad');return;}

    setTyping('🔍 Reviewing...');
    let rd=null;
    try{rd=await mgrReview(p,responses);}catch(e){console.warn('review:',e.message);}
    setTyping('');
    if(rd?.reviews&&Array.isArray(rd.reviews)){
      addMsg('mgr','🔍 Review:\n'+rd.reviews.map(rv=>`• ${rv.label||'AI'}: ${rv.score||'?'}/10 ${rv.complete?'✅':'⚠️ '+S_(rv.issue)}`).join('\n')+(rd.missing?'\n📌 Gap: '+rd.missing:''));
      rd.reviews.forEach(rv=>{if(typeof rv.idx==='number'&&rv.idx<responses.length)responses[rv.idx].score=rv.score||7;});
      let fc=0;
      for(const rv of rd.reviews){
        if(fc>=2)break;
        if(rv.complete||typeof rv.idx!=='number'||rv.idx>=responses.length)continue;
        const resp=responses[rv.idx];if(!resp||!avail.includes(resp.prov))continue;
        try{
          setTyping('🔄 Fixing '+S_(RULES[resp.prov]?.modelName||resp.prov)+'...');
          const fix=await api(resp.prov,buildSys(resp.prov,resp.sub,memSnap)+'\nPREVIOUS ISSUE: "'+S_(rv.issue||'incomplete')+'". Fix completely.',[...hist,{role:'user',content:'Fix issue "'+S_(rv.issue||'incomplete')+'" in your response. Provide the complete corrected answer.'}]);
          responses[rv.idx].text+='\n[FIXED]\n'+S_(fix);
          addMsg('mgr','🔄 '+S_(RULES[resp.prov]?.modelName||resp.prov)+' fixed');fc++;setTyping('');
        }catch(e2){addMsg('warn','❌ Fix: '+S_(e2.message));setTyping('');}
      }
    }

    if(isDebate&&responses.length>1){
      addMsg('disc','💬 Debate — AIs reviewing each other');
      for(let i=0;i<Math.min(responses.length,3);i++){
        const rv=responses[(i+1)%responses.length],sb=responses[i];
        if(!rv||!sb||!avail.includes(rv.prov))continue;
        try{
          setTyping('💬 '+S_(RULES[rv.prov]?.modelName||rv.prov)+' → '+S_(RULES[sb.prov]?.modelName||sb.prov)+'...');
          const disc=await api(rv.prov,buildSys(rv.prov,'',memSnap)+' Structured peer review.',[...hist,{role:'user',content:'Review this response to "'+S_(p).slice(0,130)+'":\n\n'+S_(sb.text).slice(0,380)+'\n\n1. What\'s good\n2. What\'s missing or wrong\n3. Your complete improved answer'}]);
          addMsg('disc','💬 '+S_(RULES[rv.prov]?.modelName||rv.prov)+' reviews '+S_(RULES[sb.prov]?.modelName||sb.prov)+':\n\n'+S_(disc));
          setTyping('');
        }catch(e3){addMsg('warn','❌ Debate: '+S_(e3.message));setTyping('');}
      }
    }

    await mgrAssemble(p,responses,rd,hist,memSnap,MGR_ID,false);
  }

  /* ── Send ── */
  const send=async()=>{
    const p=inp.trim();if(!p||busy)return;
    if(!activeId){await createChat();setTimeout(()=>send(),150);return;}
    const hist=getHist(activeMsgs,3);
    addMsg('user',p);setInp('');setBusy(true);ss('Thinking...','warn');
    doMem(p,'user').then(addMem);
    const memSnap=[...mem];
    try{
      if(activeMode==='deepcoder'){
        await runDeepCoder(p,hist,memSnap);
      }else if(activeMode==='managed'||activeMode==='debate'){
        await runManaged(p,hist,memSnap,activeMode==='debate');
      }else{
        // Fast / Smart — try preferred first, fallback through avail
        const order=[activePref,...avail.filter(x=>x!==activePref)];
        addMsg('meta',(activeMode==='smart'?'🧠 Smart':'⚡ Fast')+' · '+S_(RULES[activePref]?.modelName||activePref));
        for(const pid of order){
          if(!avail.includes(pid))continue;
          try{
            setTyping((RULES[pid]?.e||'⟳')+' '+S_(RULES[pid]?.modelName||pid)+'...');
            const t0=performance.now();
            const ans=await api(pid,buildSys(pid,'',memSnap),[...hist,{role:'user',content:p}]);
            setTyping('');
            addMsg('ai',S_(RULES[pid]?.e||'·')+' '+S_(RULES[pid]?.modelName||pid)+' ('+S_(RULES[pid]?.role||'AI')+')\n\n'+S_(ans));
            ss('✓ '+S_(RULES[pid]?.modelName||pid)+' · '+Math.round(performance.now()-t0)+'ms','good');
            return;
          }catch(e){
            setTyping('');
            const em=S_(e.message||'error');
            if(/quota|rate|429|limit/i.test(em))addMsg('warn','⚠️ '+S_(RULES[pid]?.modelName||pid)+': rate limited');
            else addMsg('warn','❌ '+pid+': '+em);
            if(activeMode==='fast')break; // fast mode = first AI only, don't chain
          }
        }
        if(activeMode!=='fast')addMsg('warn','🚫 All AIs failed. Check keys.');
        ss('Done','good');
      }
    }catch(e){addMsg('warn','🚨 '+S_(e?.message||'Unexpected error'));ss('Error','bad');}
    finally{setBusy(false);setTyping('');}
  };

  /* ── Render ── */
  const MODES=[
    {k:'fast',l:'⚡ Fast'},
    {k:'smart',l:'🧠 Smart'},
    {k:'managed',l:'🎯 Managed'},
    {k:'debate',l:'💬 Debate'},
    {k:'deepcoder',l:'💻 DeepCoder'}
  ];
  const dc=stat.c==='good'?'#10b981':stat.c==='bad'?'#ef4444':'#f59e0b';
  const isDeepCoder=activeMode==='deepcoder';

  const suggestions=['Explain quantum entanglement simply','Help me write a cover letter','Build a REST API in Node.js','Plan a 7-day Italy trip','Debug this Python code','Suggest a dinner recipe','Explain how mortgages work','Write a bedtime story'];

  return(
    <div className="layout">
      <Sidebar chats={chats} activeId={activeId} onNew={createChat} onSelect={selectChat} onDelete={deleteChat} onAbout={()=>setAboutOpen(true)} open={sideOpen} provAvail={provAvail}/>

      <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>

        {/* Header */}
        <div style={{flexShrink:0,padding:'8px 12px',borderBottom:'1px solid rgba(99,102,241,.09)',background:'rgba(1,4,14,.97)',backdropFilter:'blur(22px)',display:'flex',alignItems:'center',gap:8,zIndex:10}}>
          <button onClick={()=>setSideOpen(v=>!v)} style={{background:'none',border:'none',cursor:'pointer',color:'#475569',fontSize:18,padding:'2px 5px',borderRadius:8,flexShrink:0,lineHeight:1}}>
            {sideOpen?'◁':'≡'}
          </button>
          <div style={{width:1,height:18,background:'rgba(99,102,241,.14)',flexShrink:0}}/>
          <div style={{minWidth:0,flex:1,overflow:'hidden'}}>
            <div style={{fontSize:12,fontWeight:600,color:'#475569',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{chats.find(c=>c.id===activeId)?.title||'GoAi'}</div>
          </div>
          <div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
            <ModelPickerBtn pref={activePref} provs={provs} onClick={()=>setPickerOpen(true)}/>
            <button onClick={()=>setMemOpen(true)} style={{background:'rgba(99,102,241,.07)',border:'1px solid rgba(99,102,241,.16)',borderRadius:16,padding:'4px 9px',cursor:'pointer',color:'#a5b4fc',fontSize:10,fontFamily:'inherit'}}>🧠 {mem.length}</button>
            <div style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:dc,flexShrink:0}}>
              <span style={{width:5,height:5,borderRadius:'50%',background:dc,display:'inline-block',animation:busy?'blink 1s ease-in-out infinite':''}}/>
              <span style={{maxWidth:82,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{stat.t}</span>
            </div>
          </div>
        </div>

        {/* Mode bar */}
        <div style={{flexShrink:0,padding:'5px 10px',borderBottom:'1px solid rgba(99,102,241,.06)',background:'rgba(1,4,14,.88)',display:'flex',gap:4,alignItems:'center',overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
          {MODES.map(m=>{
            const isAct=activeMode===m.k;
            const isDC=m.k==='deepcoder';
            return(
              <button key={m.k} className={`mode-btn${isAct?(isDC?' dc':' on'):''}`} onClick={()=>setMode(m.k)}>{m.l}</button>
            );
          })}
          {isDeepCoder&&dcManagers.length>0&&(
            <span style={{fontSize:8.5,color:'#92400e',background:'rgba(249,115,22,.08)',borderRadius:8,padding:'2px 8px',flexShrink:0,whiteSpace:'nowrap'}}>
              🧠 {RULES[dcManagers[0]]?.modelName||dcManagers[0]} leads · {dcWorkers.length} workers
            </span>
          )}
        </div>
          {/* Chat area */}
        <div ref={chatRef} style={{flex:1,overflowY:'auto',padding:'14px 12px',display:'flex',flexDirection:'column',gap:9}}>
          {activeMsgs.filter(m=>!m.isLog&&!m.isComm&&m.role).length===0&&activeMsgs.length===0&&(
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:16,textAlign:'center',padding:28}}>
              <div style={{fontSize:48}}>⚡</div>
              <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:'1.35rem',background:'linear-gradient(135deg,#06b6d4,#8b5cf6,#10b981)',WebkitBackgroundClip:'text',backgroundClip:'text',color:'transparent',letterSpacing:'-.3px'}}>GoAi v6</div>
              <div style={{fontSize:11.5,color:'#334155',maxWidth:380,lineHeight:2}}>
                {Object.keys(RULES).length} AI models · {Object.keys(provs).filter(k=>provs[k]?.available).length} active · SQLite storage<br/>
                {isDeepCoder
                  ?<span style={{color:'#f97316'}}>💻 DeepCoder: DeepSeek leads a team of specialist coding AIs</span>
                  :<span>Ask me anything — coding, writing, research, math, creative work, or just chat</span>}
              </div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'center',maxWidth:440}}>
                {suggestions.map(s=>(
                  <button key={s} onClick={()=>{setInp(s);inpRef.current?.focus();}} style={{background:'rgba(99,102,241,.05)',border:'1px solid rgba(99,102,241,.14)',borderRadius:18,padding:'5px 12px',cursor:'pointer',color:'#818cf8',fontSize:10.5,fontFamily:'inherit'}}>
                    {s}
                  </button>
                ))}
              </div>
            </div>
          )}
          {activeMsgs.map(msg=><Bubble key={msg.id} msg={msg} onPv={(code,lang)=>setPv({code,lang})}/>)}
          {busy&&typing&&<Typing text={typing}/>}
        </div>

        {/* Composer */}
        <div style={{flexShrink:0,padding:'8px 12px 10px',borderTop:'1px solid rgba(99,102,241,.09)',background:'rgba(1,4,14,.97)',backdropFilter:'blur(22px)'}}>
          <div style={{display:'flex',gap:7,alignItems:'flex-end'}}>
            <textarea
              ref={inpRef}
              value={inp}
              onChange={e=>setInp(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
              disabled={busy}
              placeholder={isDeepCoder?'💻 Describe what to code... (DeepCoder mode)':'Ask anything... Enter = send · Shift+Enter = new line'}
              style={{flex:1,background:'rgba(4,8,24,.8)',border:'1px solid '+(isDeepCoder?'rgba(249,115,22,.26)':'rgba(99,102,241,.2)'),borderRadius:16,padding:'9px 13px',color:'#e2e8f0',fontSize:13,resize:'none',minHeight:42,maxHeight:120,lineHeight:1.58,fontFamily:'inherit',outline:'none',transition:'border-color .2s'}}
              rows={1}
            />
            <button
              onClick={send}
              disabled={busy||!inp.trim()}
              style={{background:busy||!inp.trim()?'rgba(99,102,241,.06)':isDeepCoder?'linear-gradient(135deg,#f97316,#ef4444)':'linear-gradient(135deg,#6366f1,#8b5cf6)',border:'none',borderRadius:14,padding:'9px 17px',cursor:busy||!inp.trim()?'not-allowed':'pointer',color:busy||!inp.trim()?'#334155':'#fff',fontWeight:700,fontSize:15,fontFamily:'inherit',flexShrink:0,boxShadow:!busy&&inp.trim()?(isDeepCoder?'0 4px 18px rgba(249,115,22,.36)':'0 4px 18px rgba(99,102,241,.34)'):'none',transition:'all .2s'}}
            >
              {busy?<span style={{display:'inline-block',animation:'spin 1s linear infinite'}}>⟳</span>:'→'}
            </button>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:5,alignItems:'center'}}>
            <span style={{fontSize:8,color:'#0f172a'}}>GoAi v6 · {provAvail} AIs · {activeMode} · Made by Arush Kumar</span>
            <button onClick={clearChat} style={{background:'none',border:'none',cursor:'pointer',color:'#0f172a',fontSize:8,fontFamily:'inherit'}}>🗑 Clear</button>
          </div>
        </div>
      </div>

      {/* Overlays */}
      <ModelSheet open={pickerOpen} onClose={()=>setPickerOpen(false)} provs={provs} pref={activePref} setPref={setPref}/>
      <MemDrawer mem={mem} open={memOpen} onClose={()=>setMemOpen(false)} onClear={()=>{setMem([]);try{localStorage.removeItem('goai_mem');}catch{}}}/>
      <PvModal pv={pv} onClose={()=>setPv(null)}/>
      <AboutModal open={aboutOpen} onClose={()=>setAboutOpen(false)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
